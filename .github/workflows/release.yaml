name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - name: Generate token for Release Bot
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  update-citation-date:
    name: Update CITATION.cff date
    needs: release-please
    if: needs.release-please.outputs.release_created
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token for Release Bot
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update date-released
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^date-released: .*/date-released: $DATE/" CITATION.cff

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || (git commit -m "chore: update CITATION.cff date-released" && git push origin main)

  deploy-docs:
    name: Deploy documentation
    needs: release-please
    if: needs.release-please.outputs.release_created
    uses: ./.github/workflows/docs.yaml
    with:
      deploy: true
      version: ${{ needs.release-please.outputs.tag_name }}
