name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  PYTHON_VERSION: "3.11"

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-24.04
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - name: Generate token for Release Bot
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json

  test:
    name: Run tests
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    uses: ./.github/workflows/tests.yaml

  build:
    name: Build package
    needs: [release-please, test]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build package
        run: uv build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/flixopt
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

  verify-pypi:
    name: Verify PyPI installation
    needs: [release-please, publish-pypi]
    runs-on: ubuntu-24.04
    steps:
      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.9"

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Verify installation
        run: |
          VERSION=${{ needs.release-please.outputs.version }}

          for delay in 10 20 40 60 90 120 180 300; do
            sleep $delay
            echo "Attempting installation (waited ${delay}s)..."

            if uv pip install --system --index-url https://pypi.org/simple/ "flixopt==$VERSION" && \
               python -c "from importlib.metadata import version; assert version('flixopt') == '$VERSION'"; then
              echo "PyPI installation successful!"
              exit 0
            fi
          done

          echo "Failed to verify PyPI installation"
          exit 1

  update-citation-date:
    name: Update CITATION.cff date
    needs: [release-please, publish-pypi]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-24.04
    steps:
      - name: Generate token for Release Bot
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.RELEASE_BOT_APP_ID }}
          private-key: ${{ secrets.RELEASE_BOT_PRIVATE_KEY }}

      - uses: actions/checkout@v6
        with:
          ref: main
          token: ${{ steps.generate-token.outputs.token }}

      - name: Update date-released
        run: |
          DATE=$(date +%Y-%m-%d)
          sed -i "s/^date-released: .*/date-released: $DATE/" CITATION.cff

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add CITATION.cff
          git diff --staged --quiet || (git commit -m "chore: update CITATION.cff date-released" && git push origin main)

  deploy-docs:
    name: Deploy documentation
    needs: [release-please, verify-pypi]
    uses: ./.github/workflows/docs.yaml
    with:
      deploy: true
      version: ${{ needs.release-please.outputs.tag_name }}
